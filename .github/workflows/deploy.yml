name: Deploy Application

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR image names must be lowercase. Compute a lowercased image name
      # and expose it to later steps via $GITHUB_ENV (avoids using template
      # expressions directly inside run: scripts).
      - name: Compute lowercase image name
        env:
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
        run: |
          IMAGE="ghcr.io/${GITHUB_REPO_OWNER}/${GITHUB_REPO_NAME}"
          echo "IMAGE_NAME=${IMAGE,,}" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # SHA tag only — never :latest in production, for traceability.
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}

      - name: Update docker-compose.yml on deploy branch
        env:
          GITHUB_COMMIT_SHA: ${{ github.sha }}
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git checkout -B deploy

          # Replace whatever tag follows the image name with the commit SHA.
          sed -i "s|image: ${IMAGE_NAME}:.*|image: ${IMAGE_NAME}:${GITHUB_COMMIT_SHA}|g" docker-compose.yml

          git add docker-compose.yml
          git commit -m "ci: update image tag to ${GITHUB_COMMIT_SHA}" || echo "No changes to commit"
          git push origin deploy --force

      - name: Trigger Portainer Redeploy Webhook
        uses: distributhor/workflow-webhook@2381f0e9c7b6bf061fb1405bd0804b8706116369 # v3.0.8
        with:
          webhook_url: ${{ secrets.PORTAINER_REDEPLOY_HOOK }}
          webhook_secret: "trigger"
